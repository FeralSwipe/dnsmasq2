name: Update OISD lists (safe)

on:
  schedule:
    - cron: "0 2 * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      # =========================
      # DOWNLOAD DNSMASQ
      # =========================

      - name: Download DNSMASQ BIG
        run: curl -s https://big.oisd.nl/dnsmasq2 -o oisd_big.lst

      - name: Download DNSMASQ SMALL
        run: curl -s https://small.oisd.nl/dnsmasq2 -o oisd_small.lst

      # =========================
      # CLEAN DNSMASQ (STRICT)
      # =========================

      - name: Clean DNSMASQ inputs
        run: |
          sed -i 's/\r$//' oisd_big.lst oisd_small.lst custom.lst

          grep '^local=/' oisd_big.lst > big_clean.lst || true
          grep '^local=/' oisd_small.lst > small_clean.lst || true

      # =========================
      # NORMALIZE CUSTOM FOR DNSMASQ
      # =========================

      - name: Normalize custom (dnsmasq format)
        run: |
          sed '/^$/d' custom.lst | \
          sed 's#^local=/##; s#/$##' | \
          awk '{print "local=/"$0"/"}' > custom_dnsmasq.lst

      # =========================
      # BUILD DNSMASQ OUTPUTS
      # =========================

      - name: Build dnsmasq outputs (SAFE CONCAT)
        run: |
          printf "" > dnsmasq2b.lst
          cat big_clean.lst >> dnsmasq2b.lst
          printf "\n" >> dnsmasq2b.lst
          cat custom_dnsmasq.lst >> dnsmasq2b.lst

          printf "" > dnsmasq2s.lst
          cat small_clean.lst >> dnsmasq2s.lst
          printf "\n" >> dnsmasq2s.lst
          cat custom_dnsmasq.lst >> dnsmasq2s.lst

      # =========================
      # DOWNLOAD SURGE
      # =========================

      - name: Download SURGE BIG
        run: curl -s https://dl.oisd.nl/oisd_big_surge.list -o surge_big.raw

      - name: Download SURGE SMALL
        run: curl -s https://dl.oisd.nl/oisd_small_surge.list -o surge_small.raw

      # =========================
      # CLEAN SURGE INPUTS
      # =========================

      - name: Clean SURGE inputs
        run: |
          sed -i 's/\r$//' surge_big.raw surge_small.raw

          grep -v '^#' surge_big.raw > surge_big.clean || true
          grep -v '^#' surge_small.raw > surge_small.clean || true

      # =========================
      # NORMALIZE CUSTOM FOR SURGE
      # =========================

      - name: Normalize custom (surge format)
        run: |
          sed '/^$/d' custom.lst | \
          sed 's#^local=/##; s#/$##' | \
          awk '{print "DOMAIN-SUFFIX,"$0}' > custom_surge.lst

      # =========================
      # BUILD SURGE OUTPUTS
      # =========================

      - name: Build surge outputs (SAFE)
        run: |
          printf "" > surgeb.lst
          cat surge_big.clean >> surgeb.lst
          printf "\n" >> surgeb.lst
          cat custom_surge.lst >> surgeb.lst

          printf "" > surges.lst
          cat surge_small.clean >> surges.lst
          printf "\n" >> surges.lst
          cat custom_surge.lst >> surges.lst

      # =========================
      # COMMIT
      # =========================

      - name: Commit changes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          git add *.lst

          git diff --cached --quiet && echo "No changes" && exit 0

          git commit -m "Auto update OISD dnsmasq + surge lists"

      # =========================
      # PUSH
      # =========================

      - name: Push changes
        run: |
          git push origin HEAD:main
