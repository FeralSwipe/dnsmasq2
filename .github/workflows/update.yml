name: Update oisd lists

on:
  schedule:
    - cron: "0 2 * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      # ---------------- DNSMASQ ----------------

      - name: Download BIG dnsmasq
        run: curl -s https://big.oisd.nl/dnsmasq2 -o oisd_big.lst

      - name: Download SMALL dnsmasq
        run: curl -s https://small.oisd.nl/dnsmasq2 -o oisd_small.lst

      - name: Clean dnsmasq BIG
        run: |
          sed -i '/^#/d' oisd_big.lst
          sed -i '/^$/d' oisd_big.lst

      - name: Clean dnsmasq SMALL
        run: |
          sed -i '/^#/d' oisd_small.lst
          sed -i '/^$/d' oisd_small.lst

      - name: Build dnsmasq outputs (NO SORT)
        run: |
          cat oisd_big.lst custom.lst > dnsmasq2b.lst
          cat oisd_small.lst custom.lst > dnsmasq2s.lst

      # ---------------- SURGE ----------------

      - name: Download BIG surge
        run: curl -s https://dl.oisd.nl/oisd_big_surge.list -o oisd_big_surge.list

      - name: Download SMALL surge
        run: curl -s https://dl.oisd.nl/oisd_small_surge.list -o oisd_small_surge.list

      - name: Clean surge lists
        run: |
          sed -i '/^#/d' oisd_big_surge.list
          sed -i '/^#/d' oisd_small_surge.list
          sed -i '/^$/d' oisd_big_surge.list
          sed -i '/^$/d' oisd_small_surge.list

      - name: Build surge outputs (NO SORT, custom last)
        run: |
          cat oisd_big_surge.list custom.lst > surgeb.lst
          cat oisd_small_surge.list custom.lst > surges.lst

      # ---------------- COMMIT ----------------

      - name: Commit changes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          git add *.lst

          git diff --cached --quiet && echo "No changes" && exit 0

          git commit -m "Auto update oisd + surge lists"

      - name: Push changes
        run: |
          git push origin HEAD:main
