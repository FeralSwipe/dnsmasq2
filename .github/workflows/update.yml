name: Update oisd lists
on:
  schedule:
    - cron: "0 2 * * *"
  workflow_dispatch:
permissions:
  contents: write
jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      # ---------------- DNSMASQ ----------------
      - name: Download BIG dnsmasq
        run: curl -s https://big.oisd.nl/dnsmasq2 -o oisd_big.lst
      - name: Download SMALL dnsmasq
        run: curl -s https://small.oisd.nl/dnsmasq2 -o oisd_small.lst
      - name: Clean dnsmasq BIG
        run: |
          sed -i '/^#/d' oisd_big.lst
          sed -i '/^$/d' oisd_big.lst
      - name: Clean dnsmasq SMALL
        run: |
          sed -i '/^#/d' oisd_small.lst
          sed -i '/^$/d' oisd_small.lst
      - name: Build dnsmasq custom block
        run: |
          python3 - <<'EOF'
          with open("custom.lst") as f:
              lines = f.read().splitlines()
          result = []
          for line in lines:
              domain = line.strip()
              if not domain or domain.startswith("#"):
                  continue
              result.append(f"local=/{domain}/")
          with open("custom_dnsmasq.lst", "w") as f:
              f.write("\n".join(result) + "\n")
          EOF
      - name: Build dnsmasq outputs
        run: |
          [ -n "$(tail -c1 oisd_big.lst)" ] && echo "" >> oisd_big.lst
          [ -n "$(tail -c1 oisd_small.lst)" ] && echo "" >> oisd_small.lst
          cat oisd_big.lst custom_dnsmasq.lst > dnsmasq2b.lst
          cat oisd_small.lst custom_dnsmasq.lst > dnsmasq2s.lst

      # ---------------- SURGE ----------------
      - name: Download BIG surge
        run: curl -s https://dl.oisd.nl/oisd_big_surge.list -o oisd_big_surge.lst
      - name: Download SMALL surge
        run: curl -s https://dl.oisd.nl/oisd_small_surge.list -o oisd_small_surge.lst
      - name: Clean surge lists
        run: |
          sed -i '/^#/d' oisd_big_surge.lst
          sed -i '/^#/d' oisd_small_surge.lst
          sed -i '/^$/d' oisd_big_surge.lst
          sed -i '/^$/d' oisd_small_surge.lst
      - name: Build surge custom block
        run: |
          python3 - <<'EOF'
          with open("custom.lst") as f:
              lines = f.read().splitlines()
          result = []
          for line in lines:
              domain = line.strip()
              if not domain or domain.startswith("#"):
                  continue
              result.append(f"DOMAIN-SUFFIX,{domain}")
          with open("custom_surge.lst", "w") as f:
              f.write("\n".join(result) + "\n")
          EOF
      - name: Build surge outputs
        run: |
          [ -n "$(tail -c1 oisd_big_surge.lst)" ] && echo "" >> oisd_big_surge.lst
          [ -n "$(tail -c1 oisd_small_surge.lst)" ] && echo "" >> oisd_small_surge.lst
          cat oisd_big_surge.lst custom_surge.lst > surgeb.lst
          cat oisd_small_surge.lst custom_surge.lst > surges.lst

      # ---------------- COMMIT ----------------
      - name: Commit changes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add *.lst
          git diff --cached --quiet && echo "No changes" && exit 0
          git commit -m "Auto update oisd + surge lists"
      - name: Push changes
        run: |
          git push origin HEAD:main
